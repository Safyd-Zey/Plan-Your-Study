name: QA Test Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем все зависимости + pydantic[email] для email validation
        pip install -r backend/requirements.txt
        pip install "pydantic[email]"
        pip install pytest pytest-cov

    # Устанавливаем рабочую директорию в backend, чтобы pytest видел package
    - name: Run tests with coverage
      working-directory: ./backend
      run: |
        pytest ../tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-report=term --cov-fail-under=80
        # --cov-fail-under=80 will fail if coverage < 80%

    - name: Move coverage reports to root
      run: |
        mv backend/coverage.xml . 2>/dev/null || true
        mv backend/htmlcov . 2>/dev/null || true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend-e2e-tests:
    name: Frontend E2E Playwright Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm install
          npm run test:e2e:install

      - name: Install backend Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-cov uvicorn

      - name: Start backend and frontend services
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          cd frontend && npm run dev -- --host 127.0.0.1 --port 4173 &
          npx wait-on http://127.0.0.1:8000/health http://127.0.0.1:4173

      - name: Run Playwright tests
        working-directory: ./frontend
        run: |
          npx playwright test --config=playwright.config.ts

  code-health:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install flake8 black
    
    - name: Lint with flake8
      run: |
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Check formatting with black
      run: |
        black backend --check || true